<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda Estudiantil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f6fa; font-family: system-ui, sans-serif; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // -- API -----------------------------------
    const BASE_URL = window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost"
      ? "http://127.0.0.1:5000/api"
      : "/api";
    // -- AUTH --
    const getToken = () => localStorage.getItem("agenda_token");
    const setToken = (t) => localStorage.setItem("agenda_token", t);
    const removeToken = () => localStorage.removeItem("agenda_token");
    
    async function request(endpoint, method = "GET", body = null) {
      const options = {
        method,
        headers: {
            "Content-Type": "application/json",
            // Añade el token si existe
            ...(getToken() ? { "Authorization": `Bearer ${getToken()}` } : {})
        }
      };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(`${BASE_URL}${endpoint}`, options);
      if (response.status === 401) {
        // Token expirado o inválido — cerramos sesión
        removeToken();
        window.location.reload();
        return;
      }
      if (!response.ok) throw new Error(`Error ${response.status}`);
      return response.json();
    }
    const API = {
      register: (email, password) => request("/auth/register", "POST", { email, password }),
      login: (email, password) => request("/auth/login", "POST", { email, password }),
      getTasks: () => request("/tasks/"),
      createTask: (d) => request("/tasks/", "POST", d),
      updateTask: (id, d) => request(`/tasks/${id}`, "PUT", d),
      deleteTask: (id) => request(`/tasks/${id}`, "DELETE"),
      getExams: () => request("/exams/"),
      createExam: (d) => request("/exams/", "POST", d),
      updateExam: (id, d) => request(`/exams/${id}`, "PUT", d),
      deleteExam: (id) => request(`/exams/${id}`, "DELETE"),
      getTimetable: () => request("/timetable/"),
      createClass: (d) => request("/timetable/", "POST", d),
      deleteClass: (id) => request(`/timetable/${id}`, "DELETE"),
      getCancelled: () => request("/timetable/cancelled"),
      toggleCancelled: (cid, date) => request("/timetable/cancelled/toggle", "POST", { classId: cid, date }),
      getGradeConfigs: () => request("/grades/config"),
      saveGradeConfig: (sk, comps) => request("/grades/config", "POST", { subjectKey: sk, components: comps }),
      getGradeValues: () => request("/grades/values"),
      saveGradeValue: (sk, cid, val) => request("/grades/values", "POST", { subjectKey: sk, configId: cid, value: val }),
      getSettings: () => request("/settings/"),
      updateSettings: (d) => request("/settings/", "PUT", d),
      getNotes: () => request("/settings/notes"),
      saveNote: (date, content) => request(`/settings/notes/${date}`, "PUT", { content }),
      getFlags: () => request("/settings/flags"),
      saveFlag: (date, d) => request(`/settings/flags/${date}`, "PUT", d),
    };

    // ── CONSTANTES ───────────────────────────────────────
    const DEFAULT_CATS=[{id:"trabajo",label:"Trabajo",color:"#185FA5"},{id:"personal",label:"Personal",color:"#0F6E56"},{id:"salud",label:"Salud",color:"#993556"},{id:"futbol",label:"Fútbol",color:"#15803d"},{id:"otro",label:"Otro",color:"#5F5E5A"}];
    const DEFAULT_SUBJECTS=[{id:"calc",label:"Cálculo",color:"#7c3aed"},{id:"prog",label:"Programación",color:"#0f766e"},{id:"redes",label:"Redes",color:"#c2410c"},{id:"so",label:"Sistemas Op.",color:"#15803d"}];
    const ACCENTS=["#185FA5","#4f46e5","#7c3aed","#be185d","#0f766e","#15803d","#c2410c","#b45309"];
    const FONT_SIZES=[{label:"Pequeño",value:13},{label:"Normal",value:15},{label:"Grande",value:17}];
    const PRIORITIES=[{id:"none",label:"Sin prioridad",color:null},{id:"high",label:"Alta",color:"#c2410c"},{id:"vhigh",label:"Muy alta",color:"#991b1b"}];
    const RECUR=[{id:"none",label:"Sin repetición"},{id:"daily",label:"Diaria"},{id:"weekly",label:"Semanal"}];
    const EXAM_TYPES=[{id:"parcial",label:"Parcial"},{id:"recuperacion",label:"Recuperación"},{id:"test",label:"Test"},{id:"laboratorio",label:"Laboratorio"},{id:"trabajo",label:"Trabajo"},{id:"presentacion",label:"Presentación"}];
    const CLASS_TYPES=[{id:"teoria",label:"Teoría",icon:"📖"},{id:"laboratorio",label:"Laboratorio",icon:"🔬"},{id:"seminario",label:"Seminario",icon:"💬"},{id:"otro",label:"Otro",icon:"📌"}];
    const DAY_NAMES_S=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
    const DAY_NAMES_F=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
    const MONTH_NAMES=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const MESES_ES=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
    const DIAS_ES=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
    const EMPTY_FORM={title:"",desc:"",cat:"",subject:"",deadline:"",note:"",recur:"none",priority:"none",timeStart:"",timeEnd:""};
    const EMPTY_EXAM={subject:"",date:"",type:"parcial",building:"",room:"",minGrade:"5",notes:"",timeStart:"",timeEnd:""};
    const EMPTY_CLASS={subject:"",dayOfWeek:0,startTime:"09:00",endTime:"10:00",type:"teoria",building:"",room:""};

    // ── HELPERS ──────────────────────────────────────────
    const todayStr=()=>new Date().toISOString().slice(0,10);
    const fmt=d=>{const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
    const fmtShort=d=>{try{const[,m,day]=d.split("-");return`${parseInt(day)} ${["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][parseInt(m)-1]}`;}catch{return d;}};
    const fmtFull=d=>{try{const[y,m,day]=d.split("-").map(Number);const dt=new Date(Date.UTC(y,m-1,day));return`${DIAS_ES[dt.getUTCDay()]} ${day} de ${MESES_ES[m-1]} de ${y}`;}catch{return d;}};
    const daysUntil=d=>{try{return Math.ceil((new Date(d+"T00:00:00")-new Date(todayStr()+"T00:00:00"))/(864e5));}catch{return 0;}};
    const dowUtc=d=>{try{const[y,m,day]=d.split("-").map(Number);return(new Date(Date.UTC(y,m-1,day)).getUTCDay()+6)%7;}catch{return 0;}};
    const hexToRgb=hex=>{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;};
    const lighten=(hex,amt=0.85)=>{if(!hex||hex.length<7)return"#eee";const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const mix=c=>Math.round(c+(255-c)*amt);return`#${mix(r).toString(16).padStart(2,"0")}${mix(g).toString(16).padStart(2,"0")}${mix(b).toString(16).padStart(2,"0")}`;};
    const gradeColor=(g,min)=>{if(g===""||g===null||g===undefined)return null;const n=parseFloat(g),m=parseFloat(min||5);return n>=m?"#0F6E56":n>=m*0.9?"#b45309":"#991b1b";};
    const weekDays=base=>{try{const[y,m,day]=base.split("-").map(Number);const d=new Date(Date.UTC(y,m-1,day)),dow=dowUtc(base);return Array.from({length:7},(_,i)=>{const x=new Date(d);x.setUTCDate(d.getUTCDate()-dow+i);return x.toISOString().slice(0,10);});}catch{return Array(7).fill(todayStr());}};
    const monthDays=base=>{try{const[y,m]=base.split("-").map(Number);const first=new Date(Date.UTC(y,m-1,1)),last=new Date(Date.UTC(y,m,0)),startDow=(first.getUTCDay()+6)%7,days=[];for(let i=0;i<startDow;i++){const x=new Date(Date.UTC(y,m-1,1-startDow+i));days.push({date:x.toISOString().slice(0,10),cur:false});}for(let i=1;i<=last.getUTCDate();i++)days.push({date:new Date(Date.UTC(y,m-1,i)).toISOString().slice(0,10),cur:true});while(days.length%7!==0){const x=new Date(Date.UTC(y,m,days.length-last.getUTCDate()-startDow+1));days.push({date:x.toISOString().slice(0,10),cur:false});}return days;}catch{return[];}};
    const expandTasks=(tasks,from,to)=>{const r=[];tasks.forEach(t=>{if(!t.recur||t.recur==="none"){if((!from||t.date>=from)&&(!to||t.date<=to))r.push(t);}else{const end=new Date((to||t.date)+"T00:00:00"),cur=new Date(t.date+"T00:00:00");while(cur<=end){const ds=cur.toISOString().slice(0,10);if(!from||ds>=from)r.push({...t,date:ds,_recurring:true});if(t.recur==="daily")cur.setDate(cur.getDate()+1);else if(t.recur==="weekly")cur.setDate(cur.getDate()+7);else break;}}});return r;};

    // ── APP ──────────────────────────────────────────────
    function App(){
      const[view,setView]=useState("day");
      const[selDate,setSelDate]=useState(todayStr());
      const[tasks,setTasks]=useState([]);
      const[exams,setExams]=useState([]);
      const[notes,setNotes]=useState({});
      const[importantDays,setImportantDays]=useState({});
      const[holidayDays,setHolidayDays]=useState({});
      const[cancelledClasses,setCancelledClasses]=useState({});
      const[timetable,setTimetable]=useState([]);
      const[timetableEnd,setTimetableEnd]=useState("");
      const[gradeConfigs,setGradeConfigs]=useState({});
      const[gradeValues,setGradeValues]=useState({});
      const[examGrades,setExamGrades]=useState({});
      const[showForm,setShowForm]=useState(false);
      const[showExamForm,setShowExamForm]=useState(false);
      const[editingExamId,setEditingExamId]=useState(null);
      const[showTimetableForm,setShowTimetableForm]=useState(false);
      const[form,setForm]=useState(EMPTY_FORM);
      const[editingTaskId,setEditingTaskId]=useState(null);
      const[examForm,setExamForm]=useState(EMPTY_EXAM);
      const[classForm,setClassForm]=useState(EMPTY_CLASS);
      const[loaded,setLoaded]=useState(false);
      const[catFilter,setCatFilter]=useState("todos");
      const[subjectFilter,setSubjectFilter]=useState("todas");
      const[search,setSearch]=useState("");
      const[showSearch,setShowSearch]=useState(false);
      const[dragId,setDragId]=useState(null);
      const[dragOver,setDragOver]=useState(null);
      const[dark,setDark]=useState(false);
      const[showSettings,setShowSettings]=useState(false);
      const[accent,setAccent]=useState("#185FA5");
      const[cats,setCats]=useState(DEFAULT_CATS);
      const[subjects,setSubjects]=useState(DEFAULT_SUBJECTS);
      const[fontSize,setFontSize]=useState(14);
      const[gradeConfigEditing,setGradeConfigEditing]=useState({});
      const[localGradeCfgs,setLocalGradeCfgs]=useState({});
      const[newComps,setNewComps]=useState({});
      const[examGradeEditing,setExamGradeEditing]=useState({});
      const[error,setError]=useState(null);
      const searchRef=useRef();
      const[authMode,setAuthMode]=useState("login");
      const[authEmail,setAuthEmail]=useState("");
      const[authPassword,setAuthPassword]=useState("");
      const[authError,setAuthError]=useState("");
      const[authLoading,setAuthLoading]=useState(false);
      const[isLoggedIn,setIsLoggedIn]=useState(!!getToken());

      useEffect(()=>{
        if(!getToken()) return;
        (async()=>{
          try{
            const[tasksData,examsData,settingsData,notesData,flagsData,timetableData,cancelledData,gradeConfigsData,gradeValuesData]=await Promise.all([
              API.getTasks(),API.getExams(),API.getSettings(),API.getNotes(),API.getFlags(),
              API.getTimetable(),API.getCancelled(),API.getGradeConfigs(),API.getGradeValues(),
            ]);
            setTasks(tasksData);
            setExams(examsData);
            const eg={};examsData.forEach(e=>{if(e.grades?.length)eg[e.id]=e.grades;});setExamGrades(eg);
            if(settingsData.cats?.length)setCats(settingsData.cats);
            if(settingsData.subjects?.length)setSubjects(settingsData.subjects);
            if(settingsData.accent)setAccent(settingsData.accent);
            if(settingsData.dark!==undefined)setDark(settingsData.dark);
            if(settingsData.fontSize)setFontSize(settingsData.fontSize);
            if(settingsData.timetableEnd)setTimetableEnd(settingsData.timetableEnd);
            setNotes(notesData);
            setImportantDays(flagsData.importantDays||{});
            setHolidayDays(flagsData.holidayDays||{});
            setTimetable(timetableData);
            setCancelledClasses(cancelledData);
            setGradeConfigs(gradeConfigsData);
            setGradeValues(gradeValuesData);
            setLoaded(true);
          }catch(e){
            setError("No se puede conectar con el servidor. ¿Está Flask corriendo?");
            console.error(e);
          }
        })();
      },[isLoggedIn]);

      const handleLogin=async()=>{
        if(!authEmail||!authPassword){
          setAuthError("Rellena todos los campos");
          return;
        }
        setAuthLoading(true);
        setAuthError("");
        try{
          const res=await API.login(authEmail,authPassword);
          setToken(res.token);
          setIsLoggedIn(true);
        }
        catch(e){
          setAuthError("Email o contraseña incorrectos");
        }
        setAuthLoading(false);
      };

      const handleRegister=async()=>{
        if(!authEmail||!authPassword){
          setAuthError("Rellena todos los campos");
          return;
        }
        if(authPassword.length<6){
          setAuthError("La contraseña debe tener al menos 6 caracteres");
          return;
        }
        setAuthLoading(true);setAuthError("");
        try{
          const res=await API.register(authEmail,authPassword);
          setToken(res.token);setIsLoggedIn(true);}
        catch(e){
          setAuthError("Error al registrarse. ¿Ya existe esa cuenta?");
        }
        setAuthLoading(false);
      };

      const handleLogout=()=>{
        removeToken();
        setIsLoggedIn(false);
        setTasks([]);
        setExams([]);
        setTimetable([]);
      };

      const getCat=id=>cats.find(c=>c.id===id);
      const getSub=id=>subjects.find(s=>s.id===id);

      const openNewTask=()=>{setEditingTaskId(null);setForm({...EMPTY_FORM,cat:cats[0]?.id||""});setShowForm(true);};
      const openEditTask=t=>{setEditingTaskId(t.id);setForm({title:t.title||"",desc:t.desc||"",cat:t.cat||"",subject:t.subject||"",deadline:t.deadline||"",note:t.note||"",recur:t.recur||"none",priority:t.priority||"none",timeStart:t.timeStart||"",timeEnd:t.timeEnd||""});setShowForm(true);};
      const saveTask=async()=>{if(!form.title.trim())return;try{if(editingTaskId){const u=await API.updateTask(editingTaskId,form);setTasks(tasks.map(t=>t.id===editingTaskId?u:t));}else{const c=await API.createTask({...form,date:selDate});setTasks([...tasks,c]);}setForm(EMPTY_FORM);setEditingTaskId(null);setShowForm(false);}catch(e){setError("Error guardando tarea");}};
      const toggle=async id=>{const t=tasks.find(t=>t.id===id);if(!t)return;try{const u=await API.updateTask(id,{done:!t.done});setTasks(tasks.map(t=>t.id===id?u:t));}catch(e){setError("Error actualizando tarea");}};
      const del=async id=>{try{await API.deleteTask(id);setTasks(tasks.filter(t=>t.id!==id));}catch(e){setError("Error eliminando tarea");}};
      const moveTask=async(id,nd)=>{try{const u=await API.updateTask(id,{date:nd});setTasks(tasks.map(t=>t.id===id?u:t));}catch(e){setError("Error moviendo tarea");}};

      const openNewExam=()=>{setEditingExamId(null);setExamForm(EMPTY_EXAM);setShowExamForm(true);};
      const openEditExam=e=>{setEditingExamId(e.id);setExamForm({subject:e.subject||"",date:e.date||"",type:e.type||"parcial",building:e.building||"",room:e.room||"",minGrade:e.minGrade||"5",notes:e.notes||"",timeStart:e.timeStart||"",timeEnd:e.timeEnd||""});setShowExamForm(true);};
      const saveExam=async()=>{if(!examForm.subject||!examForm.date)return;try{if(editingExamId){const u=await API.updateExam(editingExamId,{...examForm,grades:examGrades[editingExamId]||[]});setExams(exams.map(e=>e.id===editingExamId?u:e));}else{const c=await API.createExam(examForm);setExams([...exams,c]);}setExamForm(EMPTY_EXAM);setEditingExamId(null);setShowExamForm(false);}catch(e){setError("Error guardando examen");}};
      const delExam=async id=>{try{await API.deleteExam(id);setExams(exams.filter(e=>e.id!==id));}catch(e){setError("Error eliminando examen");}};

      const getExamGrades=id=>examGrades[id]||[];
      const setExamGradeList=(id,list)=>setExamGrades(p=>({...p,[id]:list}));
      const addExamGradeRow=id=>setExamGradeList(id,[...getExamGrades(id),{id:"eg_"+Date.now(),label:"",value:""}]);
      const updateExamGrade=(eid,rid,field,val)=>setExamGradeList(eid,getExamGrades(eid).map(r=>r.id===rid?{...r,[field]:val}:r));
      const delExamGradeRow=(eid,rid)=>setExamGradeList(eid,getExamGrades(eid).filter(r=>r.id!==rid));

      const toggleImportant=async d=>{const v=!importantDays[d];setImportantDays(p=>({...p,[d]:v}));try{await API.saveFlag(d,{isImportant:v,isHoliday:!!holidayDays[d]});}catch(e){setError("Error guardando día");}};
      const toggleHoliday=async d=>{const v=!holidayDays[d];setHolidayDays(p=>({...p,[d]:v}));try{await API.saveFlag(d,{isHoliday:v,isImportant:!!importantDays[d]});}catch(e){setError("Error guardando festivo");}};

      const addClass=async()=>{if(!classForm.subject)return;try{const c=await API.createClass(classForm);setTimetable([...timetable,c]);setClassForm(EMPTY_CLASS);setShowTimetableForm(false);}catch(e){setError("Error añadiendo clase");}};
      const delClass=async id=>{try{await API.deleteClass(id);setTimetable(timetable.filter(c=>c.id!==id));}catch(e){setError("Error eliminando clase");}};
      const toggleCancelled=async(cid,date)=>{try{const r=await API.toggleCancelled(cid,date);const k=`${cid}_${date}`;setCancelledClasses(p=>({...p,[k]:r.cancelled}));}catch(e){setError("Error cancelando clase");}};
      const isCancelled=(cid,date)=>!!cancelledClasses[`${cid}_${date}`];
      const classesForDay=dow=>timetable.filter(c=>c.dayOfWeek===dow).sort((a,b)=>a.startTime.localeCompare(b.startTime));
      const timetableActiveOnDate=date=>{if(!timetableEnd)return true;const[ey,em]=timetableEnd.split("-").map(Number);const[dy,dm]=date.split("-").map(Number);return dy<ey||(dy===ey&&dm<=em);};
      const getLinkedClass=exam=>{if(!exam?.subject||!exam?.date)return null;return classesForDay(dowUtc(exam.date)).find(c=>c.subject===exam.subject)||null;};

      const saveNoteDay=async(date,content)=>{setNotes(p=>({...p,[date]:content}));try{await API.saveNote(date,content);}catch(e){setError("Error guardando nota");}};

      const getGradeConfig=sid=>gradeConfigs[sid]||[];
      const getGradeVals=sid=>gradeValues[sid]||{};
      const setGradeValue=async(sid,cid,val)=>{setGradeValues(p=>({...p,[sid]:{...(p[sid]||{}),[cid]:val}}));try{await API.saveGradeValue(sid,cid,val);}catch(e){setError("Error guardando nota");}};
      const calcGrade=sid=>{const cfg=getGradeConfig(sid);if(!cfg.length)return{final:null,complete:false,allPass:true};const vals=getGradeVals(sid);let ws=0,tw=0,allFilled=true,allPass=true;for(const c of cfg){const raw=vals[c.id]||vals[String(c.id)],filled=raw!==undefined&&raw!=="";if(!filled){allFilled=false;continue;}const n=parseFloat(raw);ws+=n*(c.weight/100);tw+=c.weight/100;if(parseFloat(c.minGrade||0)>0&&n<parseFloat(c.minGrade))allPass=false;}const complete=allFilled&&cfg.length>0,totalW=cfg.reduce((a,c)=>a+(c.weight/100),0)||1;const final=tw>0?(ws/totalW).toFixed(2):null;return{final,complete,allPass};};
      const isEditingCfg=sid=>!!gradeConfigEditing[sid];
      const openCfgEdit=sid=>{setLocalGradeCfgs(p=>({...p,[sid]:(gradeConfigs[sid]||[]).map(c=>({...c}))}));setNewComps(p=>({...p,[sid]:{label:"",weight:"",minGrade:""}}));setGradeConfigEditing(p=>({...p,[sid]:true}));};
      const closeCfgEdit=sid=>setGradeConfigEditing(p=>({...p,[sid]:false}));
      const saveCfg=async sid=>{try{const saved=await API.saveGradeConfig(sid,localGradeCfgs[sid]||[]);setGradeConfigs(p=>({...p,[sid]:saved}));closeCfgEdit(sid);}catch(e){setError("Error guardando configuración");}};
      const setLocalCfg=(sid,val)=>setLocalGradeCfgs(p=>({...p,[sid]:val}));
      const getLocalCfg=sid=>localGradeCfgs[sid]||(gradeConfigs[sid]||[]).map(c=>({...c}));
      const getNewComp=sid=>newComps[sid]||{label:"",weight:"",minGrade:""};
      const setNewComp=(sid,val)=>setNewComps(p=>({...p,[sid]:val}));
      const addComp=sid=>{const nc=getNewComp(sid);if(!nc.label.trim()||!nc.weight)return;setLocalCfg(sid,[...getLocalCfg(sid),{id:"comp_"+Date.now(),label:nc.label.trim(),weight:parseFloat(nc.weight),minGrade:nc.minGrade}]);setNewComp(sid,{label:"",weight:"",minGrade:""});};
      const delComp=(sid,id)=>setLocalCfg(sid,getLocalCfg(sid).filter(c=>c.id!==id));
      const saveSettings=async(s)=>{try{await API.updateSettings(s);}catch(e){setError("Error guardando configuración");}};

      const prevPeriod=()=>{const[y,m,d]=selDate.split("-").map(Number);if(view==="month"){const nm=m===1?12:m-1,ny=m===1?y-1:y;setSelDate(`${ny}-${String(nm).padStart(2,"0")}-01`);}else{const dt=new Date(Date.UTC(y,m-1,d));dt.setUTCDate(dt.getUTCDate()-(view==="week"?7:1));setSelDate(dt.toISOString().slice(0,10));}};
      const nextPeriod=()=>{const[y,m,d]=selDate.split("-").map(Number);if(view==="month"){const nm=m===12?1:m+1,ny=m===12?y+1:y;setSelDate(`${ny}-${String(nm).padStart(2,"0")}-01`);}else{const dt=new Date(Date.UTC(y,m-1,d));dt.setUTCDate(dt.getUTCDate()+(view==="week"?7:1));setSelDate(dt.toISOString().slice(0,10));}};

      const noNav=["exams","stats","timetable","grades"].includes(view);

                      {isHol&&<span style={{position:"absolute",top:2,left:2,fontSize:9}}>🎉</span>}
                      {hasClass&&<span style={{position:"absolute",top:2,right:hasExam||isImp?12:3,fontSize:9}}>📚</span>}
                      {hasExam&&<span style={{position:"absolute",top:2,right:isImp?12:3,fontSize:9}}>📝</span>}
                      {isImp&&!isHol&&<span style={{position:"absolute",top:2,right:3,fontSize:9}}>⭐</span>}
                      <div style={{fontSize:12,fontWeight:isSel||isToday?700:400,color:isSel?T.accent:isHol?"#b45309":isToday?T.green:T.text,marginBottom:4,textAlign:"center"}}>{parseInt(d.split("-")[2])}</div>
                      {!isHol&&<div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>{fdt.slice(0,4).map(t=><Dot key={t.id+t.date} color={(getCat(t.cat)||{color:T.border2}).color}/>)}{fdt.length>4&&<span style={{fontSize:9,color:T.text3}}>+{fdt.length-4}</span>}</div>}
                      {dt.length>0&&!isHol&&<div style={{marginTop:3,fontSize:9,color:T.text3,textAlign:"center"}}>{dt.filter(t=>t.done).length}/{dt.length}</div>}
                      {dayExamsMonth.length>0&&!isHol&&<div style={{display:"flex",gap:2,justifyContent:"center",marginTop:3,flexWrap:"wrap"}}>{dayExamsMonth.slice(0,3).map(ex=>{const es=getSub(ex.subject);return <span key={ex.id} style={{display:"inline-block",width:8,height:3,borderRadius:99,background:es?.color||T.accent}}/>;})}</div>}

          {view==="timetable"&&(

              <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,background:T.bg2,border:`1px solid ${T.border}`,marginBottom:"1rem",flexWrap:"wrap"}}>

                ?<div style={{textAlign:"center",padding:"2.5rem 1rem",color:T.text3,fontSize,background:T.bg2,borderRadius:16,border:`1px solid ${T.border}`}}><div style={{fontSize:32,marginBottom:8}}>📅</div>No hay clases añadidas<br/><button onClick={()=>setShowTimetableForm(true)} style={{marginTop:12,background:T.accent,border:"none",borderRadius:99,padding:"7px 18px",fontSize:fontSize-1,cursor:"pointer",color:"#fff",fontWeight:600}}>+ Añadir clase</button></div>

                            <p style={{margin:0,fontSize,fontWeight:700,color:T.text}}>{DAY_NAMES_F[dow]}</p>
                            <span style={{fontSize:fontSize-2,color:T.text3,background:T.bg3,padding:"2px 8px",borderRadius:99}}>{fmt(dateForDay)}</span>
                            {isHol&&<span style={{fontSize:fontSize-2,color:"#b45309",background:"#f59e0b22",padding:"2px 8px",borderRadius:99}}>🎉 Festivo</span>}
                          </div>
                          {classes.map(cls=>{
                            const s=getSub(cls.subject),cancelled=isCancelled(cls.id,dateForDay),ct=CLASS_TYPES.find(x=>x.id===cls.type)||CLASS_TYPES[0];
                            return(
                              <div key={cls.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:12,border:`1px solid ${cancelled||isHol?"#f59e0b44":(s?.color||T.accent)+"33"}`,background:cancelled||isHol?(dark?"#2a1f00":"#fffbeb"):T.card,marginBottom:8,boxShadow:T.shadow,borderLeft:`3px solid ${cancelled||isHol?"#f59e0b":s?.color||T.accent}`,opacity:isHol||!showTT?0.5:1}}>
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{display:"flex",alignItems:"center",gap:7,flexWrap:"wrap"}}>
                                    <span style={{fontSize,fontWeight:600,color:cancelled?T.text3:s?.color||T.text,textDecoration:cancelled||isHol?"line-through":"none"}}>{s?.label||cls.subject}</span>
                                    <span style={{fontSize:fontSize-3,padding:"2px 7px",borderRadius:99,background:dark?s?.color+"18":lighten(s?.color||"#888",0.88),color:s?.color||T.text2,fontWeight:600}}>{ct.icon} {ct.label}</span>
                                    {cancelled&&<span style={{fontSize:fontSize-3,padding:"2px 8px",borderRadius:99,background:"#f59e0b22",color:"#b45309",fontWeight:700}}>Cancelada</span>}
                                  </div>
                                  <div style={{display:"flex",gap:10,marginTop:3,flexWrap:"wrap"}}>
                                    <span style={{fontSize:fontSize-2,color:T.text2}}>🕐 {cls.startTime}–{cls.endTime}</span>
                                    {cls.building&&<span style={{fontSize:fontSize-2,color:T.text2}}>🏛 {cls.building}</span>}
                                    {cls.room&&<span style={{fontSize:fontSize-2,color:T.text2}}>📍 {cls.room}</span>}
                                  </div>
                                </div>
                                <div style={{display:"flex",gap:6,flexShrink:0}}>
                                  {!isHol&&showTT&&<button onClick={()=>toggleCancelled(cls.id,dateForDay)} style={{fontSize:fontSize-2,padding:"4px 10px",borderRadius:99,border:`1px solid ${cancelled?"#f59e0b":T.border2}`,background:cancelled?(dark?"#f59e0b22":"#fffbeb"):"transparent",color:cancelled?"#b45309":T.text3,cursor:"pointer",fontWeight:600,whiteSpace:"nowrap"}}>{cancelled?"✓ Reponer":"✗ Cancelar"}</button>}
                                  <button onClick={()=>delClass(cls.id)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:T.text3,padding:"0 2px"}}>✕</button>
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                )
              }
            </div>
          )}

          {view==="exams"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.1rem"}}>
                {[{label:"Próximos",value:upcomingExams.length,color:T.accent},{label:"Esta semana",value:upcomingExams.filter(e=>daysUntil(e.date)<=7).length,color:"#c2410c"},{label:"Con notas",value:exams.filter(e=>getExamGrades(e.id).some(r=>r.value)).length,color:T.green}].map(s=>(
                  <div key={s.label} style={{background:T.bg2,borderRadius:14,border:`1px solid ${T.border}`,padding:"14px 16px",boxShadow:T.shadow}}>
                    <p style={{margin:0,fontSize:26,fontWeight:700,color:s.color}}>{s.value}</p>
                    <p style={{margin:"2px 0 0",fontSize:fontSize-2,color:T.text2}}>{s.label}</p>
                  </div>
                ))}
              </div>
              {upcomingExams.length===0
                ?<div style={{textAlign:"center",padding:"2.5rem 1rem",color:T.text3,fontSize,background:T.bg2,borderRadius:16,border:`1px solid ${T.border}`}}><div style={{fontSize:32,marginBottom:8}}>📝</div>No hay exámenes próximos</div>
                :upcomingExams.map(e=><ExamCard key={e.id} e={e}/>)
              }
              {exams.filter(e=>e.date<todayStr()).length>0&&(
                <details style={{marginTop:"1rem"}}>
                  <summary style={{fontSize:fontSize-1,color:T.text3,cursor:"pointer",padding:"8px 0"}}>Exámenes pasados ({exams.filter(e=>e.date<todayStr()).length})</summary>
                  <div style={{marginTop:8}}>{exams.filter(e=>e.date<todayStr()).sort((a,b)=>b.date.localeCompare(a.date)).map(e=><ExamCard key={e.id} e={e} past/>)}</div>
                </details>
              )}
            </div>
          )}

          {view==="grades"&&(
            <div>
              {subjects.length===0
                ?<div style={{textAlign:"center",padding:"2.5rem 1rem",color:T.text3,fontSize,background:T.bg2,borderRadius:16,border:`1px solid ${T.border}`}}><div style={{fontSize:32,marginBottom:8}}>🧮</div>Añade asignaturas en ⚙️ para usar la calculadora</div>
                :<div>
                  <p style={{fontSize:fontSize-1,color:T.text2,margin:"0 0 1rem"}}>La nota final solo se marca como aprobado/suspendido cuando están todas las componentes rellenas.</p>
                  {subjects.map(s=><GradeCalculatorCard key={s.id} subId={s.id}/>)}
                </div>
              }
            </div>
          )}

          {view==="stats"&&(
            <div>
              {subjects.map(s=>{
                const sExams=exams.filter(e=>e.subject===s.id);
                const sTasks=expanded.filter(t=>t.subject===s.id);
                const done=sTasks.filter(t=>t.done).length;
                return(
                  <div key={s.id} style={{background:T.card,borderRadius:16,border:`1px solid ${T.border}`,padding:"16px 18px",marginBottom:12,boxShadow:T.shadow,borderLeft:`4px solid ${s.color}`}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
                      <span style={{fontSize:fontSize+2,fontWeight:700,color:s.color}}>{s.label}</span>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
                      {[{label:"Exámenes",val:sExams.length,c:T.accent},{label:"Tareas",val:sTasks.length,c:T.text2},{label:"Completadas",val:done,c:T.green}].map(x=>(
                        <div key={x.label} style={{textAlign:"center",padding:"8px 4px",borderRadius:10,background:T.bg3}}>
                          <p style={{margin:0,fontSize:fontSize+2,fontWeight:700,color:x.c}}>{x.val}</p>
                          <p style={{margin:"2px 0 0",fontSize:10,color:T.text3}}>{x.label}</p>
                        </div>
                      ))}
                    </div>
                    <StatBar value={done} total={sTasks.length} color={s.color}/>
                  </div>
                );
              })}
            </div>
          )}

          {view==="pending"&&(
            <div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:"1.1rem"}}>
                {[{label:"Pendientes",value:pendingTasks.length,color:T.accent},{label:"Para hoy",value:pendingTasks.filter(t=>t.date===todayStr()).length,color:T.green},{label:"Muy alta",value:pendingTasks.filter(t=>t.priority==="vhigh").length,color:"#991b1b"}].map(s=>(
                  <div key={s.label} style={{background:T.bg2,borderRadius:14,border:`1px solid ${T.border}`,padding:"14px 16px",boxShadow:T.shadow}}>
                    <p style={{margin:0,fontSize:26,fontWeight:700,color:s.color}}>{s.value}</p>
                    <p style={{margin:"2px 0 0",fontSize:fontSize-2,color:T.text2}}>{s.label}</p>
                  </div>
                ))}
              </div>
              {pendingTasks.length===0
                ?<div style={{textAlign:"center",padding:"2.5rem 1rem",color:T.text3,fontSize,background:T.bg2,borderRadius:16,border:`1px solid ${T.border}`}}><div style={{fontSize:32,marginBottom:8}}>✅</div>¡Todo al día!</div>
                :pendingTasks.sort((a,b)=>{const po={vhigh:0,high:1,none:2};const pd=(po[a.priority||"none"]||0)-(po[b.priority||"none"]||0);if(pd!==0)return pd;if(a.deadline&&b.deadline)return a.deadline.localeCompare(b.deadline);if(a.deadline)return -1;if(b.deadline)return 1;return a.date.localeCompare(b.date);}).map(t=><TaskItem key={t.id+t.date} t={t} showDate/>)
              }
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
